<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>秀出自己</title>

    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/club.js" defer></script>
    
</head>

<body>

<div class="login-area">
    <form id="loginForm" autocomplete="off">

	    <label>請輸入隊名:</label>
	    <input type="text" name="team" required  autocomplete="off"  size="20"> <br><br>
	
	    <label>密碼:</label>
	    <input type="password" name="password" required  autocomplete="off"  size="29"> <br><br>
	
	    <button type="submit">登入</button>
	</form>

</div>

<br><br><br>

<div class="register-area">
	<form id="registerForm" autocomplete="off">

	    第一次來的  
	    看什麼，就是在說你！先註冊才可以用啦！ <br><br>
	
	    <label>隊伍名稱:</label>
	    <input type="text" name="team" required  autocomplete="off"  size="23"> <br><br>
	
	    <label>請設定密碼:</label>
	    <input type="password" name="password" required  autocomplete="off"  size="20"> <br><br>
	
	    <button type="submit">註冊</button>

	</form>
</div>


</body>
</html>
